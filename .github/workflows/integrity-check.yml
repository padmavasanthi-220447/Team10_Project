name: Link & Integrity Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly check

jobs:
  integrity:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Check Page Navigation Links
      run: |
        echo "🔗 Verifying page navigation links..."
        
        # Array of all HTML pages
        pages=("home.html" "dashboard.html" "about.html" "login.html" "register.html")
        
        errors=0
        for page in "${pages[@]}"; do
          echo ""
          echo "Checking links in $page..."
          
          # Extract all .html links
          grep -o 'href="[^"]*\.html"' "$page" | cut -d'"' -f2 | sort -u | while read link; do
            if [ -n "$link" ] && [ ! -f "$link" ]; then
              echo "✗ BROKEN LINK: $page → $link"
              errors=$((errors + 1))
            else
              echo "✓ Valid link: $link"
            fi
          done
        done
    
    - name: Verify CSS References
      run: |
        echo "🎨 Verifying CSS references in HTML files..."
        
        # Check that CSS files referenced in HTML exist
        for page in *.html; do
          echo "Checking CSS references in $page..."
          grep -o 'href="css/[^"]*\.css"' "$page" | cut -d'"' -f2 | while read css_file; do
            if [ ! -f "$css_file" ]; then
              echo "✗ MISSING CSS: $page references $css_file"
              exit 1
            else
              echo "✓ Found: $css_file"
            fi
          done
        done
    
    - name: Verify JavaScript References
      run: |
        echo "📜 Verifying JavaScript references in HTML files..."
        
        # Check that JS files referenced in HTML exist
        for page in *.html; do
          echo "Checking JS references in $page..."
          grep -o 'src="js/[^"]*\.js"' "$page" | cut -d'"' -f2 | while read js_file; do
            if [ ! -f "$js_file" ]; then
              echo "✗ MISSING JS: $page references $js_file"
              exit 1
            else
              echo "✓ Found: $js_file"
            fi
          done
        done
    
    - name: Verify Sidebar Navigation Consistency
      run: |
        echo "✔️ Checking sidebar navigation consistency..."
        
        expected_links=("home.html" "dashboard.html" "about.html" "login.html" "register.html")
        
        for page in *.html; do
          echo "Verifying navigation in $page..."
          for link in "${expected_links[@]}"; do
            if ! grep -q "href=\"$link\"" "$page" 2>/dev/null; then
              echo "⚠️  WARNING: $page might be missing link to $link"
            else
              echo "✓ $page has link to $link"
            fi
          done
        done
    
    - name: Check File Consistency
      run: |
        echo "📁 Checking file consistency..."
        
        # Verify files are valid
        for file in *.html; do
          if [ ! -s "$file" ]; then
            echo "✗ ERROR: $file is empty!"
            exit 1
          fi
          
          # Check file size (should be > 1KB)
          size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
          if [ "$size" -lt 1024 ]; then
            echo "⚠️  WARNING: $file is suspiciously small (${size} bytes)"
          else
            echo "✓ $file is valid (${size} bytes)"
          fi
        done
    
    - name: Verify Required Attributes
      run: |
        echo "🏷️ Checking required HTML attributes..."
        
        for page in *.html; do
          echo "Checking $page..."
          
          # Check for DOCTYPE
          if ! grep -q "<!DOCTYPE" "$page"; then
            echo "✗ MISSING: DOCTYPE in $page"
            exit 1
          fi
          
          # Check for charset
          if ! grep -q "charset" "$page"; then
            echo "⚠️  WARNING: No charset defined in $page"
          fi
          
          echo "✓ $page has required structure"
        done
    
    - name: Verify CSS Properties
      run: |
        echo "🎨 Validating CSS structure..."
        
        for css_file in css/*.css; do
          echo "Checking $css_file..."
          
          # Check for mismatched braces
          open_braces=$(grep -o "{" "$css_file" 2>/dev/null | wc -l)
          close_braces=$(grep -o "}" "$css_file" 2>/dev/null | wc -l)
          
          if [ "$open_braces" -ne "$close_braces" ]; then
            echo "✗ ERROR: Mismatched braces in $css_file"
            exit 1
          fi
          
          # Check for orphaned semicolons (basic check)
          echo "✓ $css_file structure valid"
        done
    
    - name: Generate Integrity Report
      run: |
        report="integrity-report.md"
        
        cat > "$report" << 'EOF'
        # Integrity Check Report
        
        ## Check Summary
        EOF
        
        echo "- **Date**: $(date)" >> "$report"
        echo "- **Commit**: ${{ github.sha }}" >> "$report"
        echo "" >> "$report"
        echo "## Checks Performed" >> "$report"
        echo "- ✓ Page navigation links verified" >> "$report"
        echo "- ✓ CSS references verified" >> "$report"
        echo "- ✓ JavaScript references verified" >> "$report"
        echo "- ✓ Sidebar navigation consistency checked" >> "$report"
        echo "- ✓ HTML structure validated" >> "$report"
        echo "- ✓ CSS syntax validated" >> "$report"
        echo "" >> "$report"
        echo "## File Inventory" >> "$report"
        echo "- HTML Pages: $(find . -maxdepth 1 -name '*.html' | wc -l)" >> "$report"
        echo "- CSS Files: $(find css -name '*.css' | wc -l)" >> "$report"
        echo "- JS Files: $(find js -name '*.js' | wc -l)" >> "$report"
        echo "" >> "$report"
        echo "## Status: ✅ ALL CHECKS PASSED" >> "$report"
        
        cat "$report"
    
    - name: Upload Integrity Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integrity-reports
        path: integrity-report.md
