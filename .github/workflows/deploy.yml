name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js for Build Tools
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install Dependencies
      run: npm install --global htmlhint 2>/dev/null || true
    
    - name: Pre-deployment Validation
      run: |
        echo "🔍 Running pre-deployment checks..."
        
        # Check all pages exist
        pages=("home.html" "dashboard.html" "about.html" "login.html" "register.html")
        for page in "${pages[@]}"; do
          if [ ! -f "$page" ]; then
            echo "✗ ERROR: $page not found!"
            exit 1
          fi
          echo "✓ $page found"
        done
        
        # Check all CSS files exist
        css_files=("home.css" "dashboard.css" "about.css" "auth.css")
        for css in "${css_files[@]}"; do
          if [ ! -f "css/$css" ]; then
            echo "✗ ERROR: css/$css not found!"
            exit 1
          fi
          echo "✓ css/$css found"
        done
        
        # Check JS files
        if [ ! -f "js/dashboard.js" ]; then
          echo "✗ ERROR: js/dashboard.js not found!"
          exit 1
        fi
        echo "✓ js/dashboard.js found"
        
        # Check for broken internal links
        echo ""
        echo "Checking internal links..."
        for file in *.html; do
          # Extract all href links to .html files
          grep -o 'href="[^"]*\.html"' "$file" | cut -d'"' -f2 | while read link; do
            if [ ! -f "$link" ]; then
              echo "✗ WARNING: $file references missing file: $link"
            fi
          done
        done
    
    - name: Build Artifacts
      run: |
        echo "📦 Creating build artifacts..."
        
        # Create build directory
        mkdir -p build
        
        # Copy all files
        cp *.html build/
        cp -r css build/
        cp -r js build/
        cp -r images build/ 2>/dev/null || true
        
        # Create manifest
        cat > build/MANIFEST.txt << EOF
        Build Manifest
        Generated: $(date)
        Commit: ${{ github.sha }}
        Branch: main
        
        Files Included:
        - Pages: 5 HTML files
        - Styles: 4 CSS files
        - Scripts: 1 JavaScript file
        
        Deployed Pages:
        - home.html
        - dashboard.html
        - about.html
        - login.html
        - register.html
        EOF
        
        echo "✓ Build artifacts created"
        ls -la build/
    
    - name: Generate Deployment Report
      run: |
        report="build/DEPLOYMENT_REPORT.md"
        cat > "$report" << 'EOF'
        # Deployment Report
        
        ## Build Information
        EOF
        
        echo "- **Date**: $(date)" >> "$report"
        echo "- **Commit**: ${{ github.sha }}" >> "$report"
        echo "- **Branch**: main" >> "$report"
        echo "- **Status**: ✓ SUCCESS" >> "$report"
        echo "" >> "$report"
        echo "## Deployed Files" >> "$report"
        echo "" >> "$report"
        
        ls -1 *.html | sed 's/^/- /' >> "$report"
        echo "" >> "$report"
        echo "### CSS Stylesheets" >> "$report"
        ls -1 css/*.css | sed 's/^/- /' >> "$report"
        echo "" >> "$report"
        echo "### JavaScript Files" >> "$report"
        ls -1 js/*.js | sed 's/^/- /' >> "$report"
        
        cat "$report"
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: build/
        retention-days: 30
    
    - name: Deployment Summary
      run: |
        echo "✅ DEPLOYMENT SUCCESSFUL"
        echo ""
        echo "Summary:"
        echo "- All pages verified"
        echo "- All stylesheets verified"
        echo "- All scripts verified"
        echo "- Build artifacts created"
        echo "- Ready for production"
