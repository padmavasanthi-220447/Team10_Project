<!DOCTYPE html>
<html>
<head>
    <title>Register - Smart Expense Tracker</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="sidebar">
    <h2>💰 SmartExpense</h2>
    <a href="home.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="about.html">About</a>
    <a href="login.html">Login</a>
    <a href="register.html" class="active">Register</a>
</div>

<div class="main-content">

<div class="auth-container">
    <div class="auth-box">
        <h1>Register</h1>
        <p class="auth-subtitle">Create your SmartExpense account</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms and Conditions</label>
            </div>

            <button type="submit" class="btn-submit">Register</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="social-login">
            <button type="button" class="btn-social btn-google">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg>
                SignUp with Google
            </button>
            <button type="button" class="btn-social btn-facebook">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a6 6 0 0 0-6 6v3H7v4h2v8h4v-8h2l1-4h-3V8a1 1 0 0 1 1-1h2z"></path></svg>
                SignUp with Facebook
            </button>
        </div>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
</div>

</div>

</body>
</html>
