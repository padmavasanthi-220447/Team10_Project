<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dummy Finance - Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header>
          <div class="brand">
            <h1>Dummy Finance Dashboard</h1>
            <p>Dummy payments + sync with your expense tracker.</p>
          </div>

          <div class="actions">
            <button class="btn secondary" type="button" id="logoutBtn">Logout</button>
          </div>
        </header>

        <section class="section" style="margin-bottom: 16px;">
          <h2>Your Details</h2>
          <p id="userDetails" style="color:#111827; font-weight:600;"></p>
          <p id="dashboardMessage" class="message" aria-live="polite"></p>

          <div class="form-actions" style="margin-top: 12px;">
            <button class="btn primary" type="button" id="syncBtn">
              <span id="syncSpinner" class="spinner"></span>
              <span id="syncBtnText">Sync with Expense Tracker</span>
            </button>
          </div>
        </section>

        <div class="grid">
          <section class="section">
            <h2>Make Dummy Payment</h2>
            <form id="paymentForm">
              <div class="field">
                <label for="amount">Amount</label>
                <input id="amount" name="amount" type="number" min="1" step="0.01" required />
              </div>

              <div class="input-group">
                <label>Category</label>
                <select id="category" name="category">
                <option value="food">Food</option>
                <option value="bills">Bills</option>
                <option value="salary">Salary</option>
                <option value="shopping">Shopping</option>
                <option value="entertainment">Entertainment</option>
                <option value="transport">Transport</option>
                <option value="health">Health</option>
                <option value="education">Education</option>
                <option value="other">Other</option>
                </select>
                </div>

              <div class="field">
                <label for="description">Description</label>
                <textarea
                  id="description"
                  name="description"
                  rows="3"
                  placeholder="Short description"
                  required
                ></textarea>
              </div>

              <div class="form-actions">
                <button class="btn primary" type="submit">
                  <span id="paySpinner" class="spinner"></span>
                  <span id="payBtnText">Add Transaction</span>
                </button>
              </div>
            </form>
          </section>

          <section class="section">
            <h2>Transaction History</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Amount</th>
                  </tr>
                </thead>
                <tbody id="txTbody">
                  <tr>
                    <td colspan="5" style="color:#6b7280; font-weight:600; padding:16px;">
                      Loading...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
