<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cash Compass - Dashboard</title>

    <link rel="icon" href="images/transparent_logo.png" />
    <link rel="stylesheet" href="styles/home.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!-- NAVBAR -->

      <nav class="navbar">
        <div class="nav-left">
          <img src="images/transparent_logo.png" class="nav-logo" />

          <h2>CASH COMPASS</h2>
        </div>

        <div class="nav-right">
          <a href="add-expense.html">Add Expense</a>

          <a href="analytics.html">Analytics</a>

          <a href="#" class="logout-btn" onclick="confirmLogout()">Logout</a>
        </div>
      </nav>

      <!-- MAIN CONTENT -->

      <section class="main-section">
        <div class="greeting">
          <h1>Hello, <span id="username">User</span> 👋</h1>

          <p>Here's your financial overview for this month.</p>
        </div>

        <div class="cards">
          <div class="card">
            <h3>This Month Budget</h3>
            <p id="budgetCard">₹0</p>
          </div>

          <div class="card">
            <h3>Total Expenses</h3>
            <p id="expenseCard">₹0</p>
          </div>

          <div class="card">
            <h3>Total Savings</h3>
            <p id="savingsCard">₹0</p>
          </div>
        </div>
      </section>

      <div class="chart-section">
        <h2>Weekly Expense Trend</h2>

        <canvas id="weeklyChart"></canvas>
      </div>

      <!-- FOOTER -->

      <footer class="footer">
        <p>© 2026 CASH COMPASS - A Smart Expense Tracker</p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/home.js"></script>
  </body>
</html>
