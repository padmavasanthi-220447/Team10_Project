<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASH COMPASS - Login</title>
<link rel="icon" href="images/transparent_logo.png">
<link rel="stylesheet" href="styles/theme.css">
<link rel="stylesheet" href="styles/login.css">

</head>

<body>

<div class="page-wrapper">

<div class="container">

<!-- LEFT PANEL -->

<div class="left-panel">
<img src="images/transparent_logo.png" class="quote-logo" alt="SET Logo">
<h1>CASH COMPASS</h1>
<p id="quote" class="quote"></p>
</div>

<!-- RIGHT PANEL -->

<div class="right-panel">

<div class="form-container">

        <!-- LOGIN FORM -->
        <form id="login-form">
          <h2><center>Login</center></h2>
          
          <input type="email" name="email" placeholder="Email" required>
          <input type="password" name="password" placeholder="Password" required>
          
          <button type="submit">Login</button>
          
          <div class="google-login-container">
            <button type="button" id="google-login-btn" class="google-login-btn">
              <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" class="google-icon" />
              Sign in with Google
            </button>
          </div>
          
          <p class="toggle">
            Don't have an account? <a href="#" onclick="showRegister()">Register</a>
          </p>
        </form>

        <!-- REGISTER FORM -->
        <form id="register-form" style="display:none;">
          <h2>Create Account</h2>
          
          <input type="text" name="name" placeholder="Full Name" required>
          <input type="email" name="email" placeholder="Email" required>
          <input type="password" name="password" id="password" placeholder="Password" required>
          <input type="password" name="confirm_password" id="confirm-password" placeholder="Confirm Password" required>
          
          <button type="submit">Register</button>
          
          <p class="toggle">
            Already have an account? <a href="#" onclick="showLogin()">Login</a>
          </p>
        </form>

</div>
</div>

</div>


<!-- FOOTER -->

<footer class="footer">

<p>© 2026 CASH COMPASS - A Smart Expense Tracker</p>

</footer>

</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/login.js"></script>

</body>
</html>
